name: Auto-update fixtures
on:
  schedule:
    # Every 3 hours. Knockout teams resolve and scores fill in within a few
    # hours of each match. FIFA's public API needs no key or rate-limit budget.
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fixtures
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch live FIFA data into overrides.json
        env:
          WC_COMPETITION_ID: ${{ vars.WC_COMPETITION_ID || '17' }}
          WC_FROM: ${{ vars.WC_FROM || '2026-06-01' }}
          WC_TO: ${{ vars.WC_TO || '2026-07-31' }}
        run: node scripts/update-fixtures.js

      - name: Rebuild fixtures.json and feeds
        run: |
          node scripts/build-data.js
          node scripts/build-ics.js

      - name: Commit changes if any
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/overrides.json data/fixtures.json feeds
          # Only commit when the actual data moved. The .ics files always differ
          # (build-ics stamps a fresh DTSTAMP each run), so committing on feed
          # churn alone would mean a needless commit + redeploy every 3 hours.
          if git diff --cached --quiet -- data/overrides.json data/fixtures.json; then
            echo 'No substantive fixture changes (feed timestamps only); skipping.'
            git reset -q
          else
            git commit -m 'chore: auto-update fixtures from live FIFA data'
            git push
          fi
