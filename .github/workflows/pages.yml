name: Build & deploy site
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: [Auto-update fixtures]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build fixtures.json
        run: node scripts/build-data.js
      - name: Build .ics feeds
        run: node scripts/build-ics.js
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r index.html assets data feeds _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
